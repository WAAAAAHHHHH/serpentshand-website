name = "kiwi-archive"
compatibility_date = "2024-01-01"

# Bind your D1 database to the variable name "DB"
# In your Cloudflare Dashboard, go to Pages -> Settings -> Functions -> D1 Database bindings
# and bind your existing database to the variable "DB".
# For local development with wrangler, uncomment and add your database_name and database_id:
#
# [[d1_databases]]
# binding = "DB"
# database_name = "your-database-name"
# database_id = "your-database-id"
