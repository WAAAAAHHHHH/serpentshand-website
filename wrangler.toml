name = "kiwi-archive"
compatibility_date = "2024-01-01"

# Bind your D1 database to the variable name "DB".
# In your Cloudflare Dashboard: Pages -> your project -> Settings ->
# Functions -> D1 database bindings, and bind your existing database
# to the variable "DB". (The block below is only needed for local
# `wrangler dev` / `wrangler d1 execute` usage.)
[[d1_databases]]
binding = "DB"
database_name = "serpentshand-db"
database_id = "c1ba95d8-47cc-4bbd-b5ed-3d2c3ebbc84a"

# ------------------------------------------------------------------
# OPTIONAL: Cloudflare R2 bucket for avatar uploads.
# If you configure this (in the dashboard, or here for local dev),
# /api/profile/avatar will upload images to R2 instead of requiring
# an external image URL. Without it, avatars fall back to plain
# https:// image URLs, which always works with zero extra setup.
# ------------------------------------------------------------------
# [[r2_buckets]]
# binding = "AVATARS"
# bucket_name = "kiwi-archive-avatars"
#
# [vars]
# AVATARS_PUBLIC_URL = "https://avatars.kiwi.pages.dev"
