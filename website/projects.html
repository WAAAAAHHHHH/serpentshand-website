<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Kiwi</title>
  <meta name="theme-color" content="#07090a">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <canvas id="dust-canvas"></canvas>
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>
  <div class="mouse-light" id="mouse-light" aria-hidden="true"></div>

  <header class="site-header" id="site-header">
    <nav class="nav" id="site-nav" aria-label="Primary">
      <a href="/" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <button class="nav__toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links" id="nav-links">
        <li><a href="/projects.html">Projects</a></li>
        <li><a href="/#forum">Forum</a></li>
      </ul>
      <div class="nav__user-area" id="nav-user-area" aria-label="User menu"></div>
    </nav>
  </header>

  <main id="main">
    <section class="section">
      <div class="section__head reveal">
        <span class="section__kicker">Directory</span>
        <h2 class="section__title">Projects</h2>
        <p class="section__intro">Discover creations and ongoing works.</p>
      </div>

      <div class="projects-container reveal">
        <div class="forum__search">
          <input type="text" id="projects-search-input" placeholder="Search projects by title, tag, or category..." aria-label="Search projects">
        </div>
        
        <div class="projects__actions" style="margin-top: 1rem; text-align: right;">
          <a href="/create-project.html" class="btn btn--glow" id="create-project-btn" style="display: none;">
            <span>Create Project</span>
          </a>
        </div>

        <p class="forum__empty" id="projects-empty" hidden>No projects found.</p>

        <!-- Project Grid -->
        <div class="projects-grid" id="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem;">
          <!-- Projects injected by JS -->
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__seal">
      <img src="/assets/seal.svg" alt="" width="40" height="40">
    </div>
    <p class="footer__meta">&copy; <span id="year"></span> Kiwi. All relics reserved.</p>
  </footer>

  <script src="/script.js" defer></script>
</body>
</html>
