<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Kiwi's Archive</title>
  <meta name="description" content="Log in to Kiwi's Archive.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="bg-layer" aria-hidden="true">
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav is-scrolled" id="site-nav" aria-label="Primary">
      <a href="/#top" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/#forum">Forum</a></li>
        <li><a href="/#contacts">Contacts</a></li>
      </ul>
      <div id="nav-auth-slot"></div>
    </nav>
  </header>

  <main id="main">
    <section class="auth-page">
      <div class="auth-card">
        <span class="auth-card__kicker">Restricted Access</span>
        <h1 class="auth-card__title">Log In</h1>
        <p class="auth-card__intro">Enter your credentials to access your account.</p>

        <form id="login-form" novalidate>
          <div class="auth-field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required autocomplete="email" placeholder="you@example.com">
          </div>
          <div class="auth-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••">
          </div>
          <p class="auth-hint" id="login-hint" role="alert"></p>
          <button type="submit" class="btn btn--glow">
            <span>Log In</span>
          </button>
        </form>

        <p class="auth-card__foot">No account yet? <a href="/signup.html">Sign up</a></p>
      </div>
    </section>
  </main>

  <script src="/auth.js" defer></script>
</body>
</html>
