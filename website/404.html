<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sealed Page — Kiwi's Archive</title>
  <meta name="description" content="This page is sealed, missing, or was never catalogued.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }
    .error-page__code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--brass-bright);
      letter-spacing: 0.2em;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }
    .error-page__title {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      margin-bottom: 1rem;
    }
    .error-page__desc {
      max-width: 480px;
      color: var(--parchment-dim);
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <main class="error-page">
    <img src="/assets/seal.svg" alt="" width="70" height="70" style="margin-bottom:1.5rem; opacity:0.7;">
    <p class="error-page__code">FILE NOT FOUND · SH‑404</p>
    <h1 class="error-page__title">This Page Was Never Catalogued</h1>
    <p class="error-page__desc">
      Either the record was sealed away, misfiled, or it never existed
      in this archive to begin with. Return to what has been recovered.
    </p>
    <a href="/" class="btn btn--glow">
      <span>Return to the Archive</span>
    </a>
  </main>
</body>
</html>
