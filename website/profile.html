<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Kiwi Archive</title>
  <meta name="description" content="Manage your Kiwi Archive profile and settings.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-body">

  <div class="bg-layer" aria-hidden="true">
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="sigil-field">
      <img src="/assets/seal.svg" alt="" class="sigil sigil--a">
      <img src="/assets/seal.svg" alt="" class="sigil sigil--b">
    </div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <div class="mouse-light" id="mouse-light" aria-hidden="true"></div>

  <header class="site-header" id="site-header">
    <nav class="nav is-scrolled" id="site-nav" aria-label="Primary">
      <a href="/" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/#forum">Forum</a></li>
        <li><a href="/#contacts">Contacts</a></li>
      </ul>
      <!-- User menu injected by JS -->
      <div class="nav__user-area" id="nav-user-area"></div>
    </nav>
  </header>

  <main id="main" class="profile-page">
    <!-- Loading state -->
    <div class="profile-loading" id="profile-loading" aria-label="Loading profile">
      <img src="/assets/seal.svg" alt="" class="profile-loading__seal">
      <p>Unsealing profile…</p>
    </div>

    <!-- Profile content (shown after load) -->
    <div class="profile-wrap" id="profile-wrap" hidden>

      <!-- Left column: avatar + stats -->
      <aside class="profile-aside">
        <div class="profile-avatar-wrap">
          <img
            class="profile-avatar"
            id="profile-avatar-img"
            src="/assets/portrait-fallback.svg"
            alt="Your avatar"
            onerror="this.src='/assets/portrait-fallback.svg'"
          >
        </div>
        <h1 class="profile-display-name" id="profile-display-name"></h1>
        <p class="profile-username" id="profile-username-display"></p>

        <dl class="profile-stats">
          <div class="profile-stat">
            <dt>Member since</dt>
            <dd id="stat-joined">—</dd>
          </div>
          <div class="profile-stat">
            <dt>Forum entries</dt>
            <dd id="stat-posts">—</dd>
          </div>
        </dl>

        <a href="/" class="btn btn--glow profile-back-btn">
          <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Back to Archive</span>
        </a>
      </aside>

      <!-- Right column: settings form -->
      <section class="profile-settings" aria-labelledby="settings-heading">
        <div class="profile-settings__header">
          <span class="section__kicker">Settings</span>
          <h2 id="settings-heading" class="profile-settings__title">Edit Profile</h2>
        </div>

        <form class="auth-form profile-form" id="profile-form" novalidate>

          <div class="auth-form__row">
            <div class="auth-form__field">
              <label for="pf-display-name">Display Name</label>
              <input
                type="text"
                id="pf-display-name"
                name="display_name"
                maxlength="60"
                placeholder="How you appear on posts"
                autocomplete="nickname"
              >
            </div>
            <div class="auth-form__field">
              <label for="pf-username">Username</label>
              <input
                type="text"
                id="pf-username"
                name="username"
                maxlength="40"
                minlength="3"
                pattern="[a-zA-Z0-9_]+"
                placeholder="your_handle"
                autocomplete="username"
              >
              <span class="auth-form__field-hint" id="pf-username-hint"></span>
            </div>
          </div>

          <div class="auth-form__field">
            <label for="pf-description">Bio / Description</label>
            <textarea
              id="pf-description"
              name="description"
              rows="3"
              maxlength="300"
              placeholder="Tell the Archive who you are…"
            ></textarea>
          </div>

          <div class="auth-form__field">
            <label for="pf-avatar-url">Avatar URL</label>
            <input
              type="url"
              id="pf-avatar-url"
              name="avatar_url"
              maxlength="512"
              placeholder="https://example.com/your-avatar.jpg"
              autocomplete="off"
            >
            <span class="auth-form__field-hint">Paste an image URL. It will be displayed on your posts.</span>
          </div>

          <!-- Account section (read-only) -->
          <div class="profile-settings__divider">
            <span>Account</span>
          </div>

          <div class="auth-form__field">
            <label for="pf-email">Email Address</label>
            <input
              type="email"
              id="pf-email"
              name="email"
              disabled
              aria-describedby="email-note"
            >
            <span class="auth-form__field-hint" id="email-note">Email cannot be changed at this time.</span>
          </div>

          <p class="auth-form__error" id="profile-error" role="alert" hidden></p>
          <p class="auth-form__success" id="profile-success" role="status" hidden></p>

          <div class="profile-form__actions">
            <button type="submit" class="btn btn--glow auth-form__submit" id="profile-save-btn">
              <span>Save Changes</span>
            </button>
            <button type="button" class="btn profile-form__logout" id="profile-logout-btn">
              <span>Sign Out</span>
            </button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      // Mouse light
      const ml = document.getElementById('mouse-light');
      if (ml && window.matchMedia('(hover: hover)').matches) {
        window.addEventListener('pointermove', e => {
          ml.style.setProperty('--mx', `${e.clientX}px`);
          ml.style.setProperty('--my', `${e.clientY}px`);
        });
      }

      const loadingEl  = document.getElementById('profile-loading');
      const wrapEl     = document.getElementById('profile-wrap');
      const errorEl    = document.getElementById('profile-error');
      const successEl  = document.getElementById('profile-success');
      const saveBtn    = document.getElementById('profile-save-btn');
      const logoutBtn  = document.getElementById('profile-logout-btn');

      let currentUser = null;

      // ------------------------------------------------------------------
      // Format date
      // ------------------------------------------------------------------
      const formatDate = iso => {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString(undefined, {
          year: 'numeric', month: 'long', day: 'numeric'
        });
      };

      // ------------------------------------------------------------------
      // Populate form with user data
      // ------------------------------------------------------------------
      const populate = user => {
        currentUser = user;

        // Aside
        const avatarImg = document.getElementById('profile-avatar-img');
        if (user.avatar_url) {
          avatarImg.src = user.avatar_url;
        }
        document.getElementById('profile-display-name').textContent = user.display_name || user.username;
        document.getElementById('profile-username-display').textContent = '@' + user.username;
        document.getElementById('stat-joined').textContent = formatDate(user.created_at);
        document.getElementById('stat-posts').textContent  = user.post_count ?? 0;

        // Form fields
        document.getElementById('pf-display-name').value = user.display_name || '';
        document.getElementById('pf-username').value     = user.username || '';
        document.getElementById('pf-description').value  = user.description || '';
        document.getElementById('pf-avatar-url').value   = user.avatar_url || '';
        document.getElementById('pf-email').value        = user.email || '';
      };

      // ------------------------------------------------------------------
      // Username hint
      // ------------------------------------------------------------------
      const usernameInput = document.getElementById('pf-username');
      const usernameHint  = document.getElementById('pf-username-hint');
      if (usernameInput) {
        usernameInput.addEventListener('input', () => {
          const val = usernameInput.value;
          if (!val || (currentUser && val === currentUser.username)) {
            usernameHint.textContent = '';
            return;
          }
          if (val.length < 3) {
            usernameHint.textContent = 'At least 3 characters';
            usernameHint.style.color = '#c88a8a';
          } else if (!/^[a-zA-Z0-9_]+$/.test(val)) {
            usernameHint.textContent = 'Only letters, numbers, underscores';
            usernameHint.style.color = '#c88a8a';
          } else {
            usernameHint.textContent = 'Available (will be checked on save)';
            usernameHint.style.color = '#4fd99a';
          }
        });
      }

      // ------------------------------------------------------------------
      // Live avatar preview
      // ------------------------------------------------------------------
      const avatarInput = document.getElementById('pf-avatar-url');
      const avatarImg   = document.getElementById('profile-avatar-img');
      if (avatarInput) {
        let previewTimer;
        avatarInput.addEventListener('input', () => {
          clearTimeout(previewTimer);
          previewTimer = setTimeout(() => {
            const url = avatarInput.value.trim();
            if (url) avatarImg.src = url;
            else avatarImg.src = '/assets/portrait-fallback.svg';
          }, 600);
        });
      }

      // ------------------------------------------------------------------
      // Load user from API
      // ------------------------------------------------------------------
      (async () => {
        try {
          const res = await fetch('/api/auth/me');
          if (!res.ok) {
            // Not logged in — redirect
            window.location.replace('/login.html?next=/profile.html');
            return;
          }
          const data = await res.json();
          populate(data.user);
          loadingEl.hidden = true;
          wrapEl.hidden = false;
        } catch {
          loadingEl.hidden = true;
          errorEl.textContent = 'Failed to load profile. Please refresh.';
          errorEl.hidden = false;
        }
      })();

      // ------------------------------------------------------------------
      // Save profile
      // ------------------------------------------------------------------
      const form = document.getElementById('profile-form');
      form.addEventListener('submit', async e => {
        e.preventDefault();
        errorEl.hidden   = true;
        successEl.hidden = true;

        const payload = {
          display_name: document.getElementById('pf-display-name').value.trim(),
          username:     document.getElementById('pf-username').value.trim(),
          description:  document.getElementById('pf-description').value.trim(),
          avatar_url:   document.getElementById('pf-avatar-url').value.trim(),
        };

        saveBtn.disabled = true;
        saveBtn.querySelector('span').textContent = 'Saving…';

        try {
          const res  = await fetch('/api/profile', {
            method:  'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(payload),
          });
          const data = await res.json();

          if (res.ok) {
            populate(data.user);
            successEl.textContent = 'Profile updated successfully.';
            successEl.hidden = false;
            setTimeout(() => { successEl.hidden = true; }, 4000);
          } else {
            const fieldErrors = data.fields
              ? Object.values(data.fields).join(' ')
              : '';
            errorEl.textContent = fieldErrors || data.error || 'Save failed. Please try again.';
            errorEl.hidden = false;
          }
        } catch {
          errorEl.textContent = 'A network error occurred. Please try again.';
          errorEl.hidden = false;
        } finally {
          saveBtn.disabled = false;
          saveBtn.querySelector('span').textContent = 'Save Changes';
        }
      });

      // ------------------------------------------------------------------
      // Logout
      // ------------------------------------------------------------------
      logoutBtn.addEventListener('click', async () => {
        logoutBtn.disabled = true;
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
        } catch { /* best effort */ }
        window.location.replace('/');
      });

    })();
  </script>
</body>
</html>
