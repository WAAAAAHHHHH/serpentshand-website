<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — Kiwi's Archive</title>
  <meta name="description" content="Your account on Kiwi's Archive.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="bg-layer" aria-hidden="true">
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav is-scrolled" id="site-nav" aria-label="Primary">
      <a href="/#top" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/#forum">Forum</a></li>
        <li><a href="/#contacts">Contacts</a></li>
      </ul>
      <div id="nav-auth-slot"></div>
    </nav>
  </header>

  <main id="main">
    <section class="auth-page">
      <div class="auth-card" id="profile-content" hidden>
        <span class="auth-card__kicker">Restricted Access</span>
        <h1 class="auth-card__title">Your Account</h1>

        <div class="profile-row">
          <span class="profile-row__label">Email</span>
          <span class="profile-row__value" id="profile-email">—</span>
        </div>
        <div class="profile-row">
          <span class="profile-row__label">Member Since</span>
          <span class="profile-row__value" id="profile-created">—</span>
        </div>

        <button type="button" class="btn btn--glow" id="logout-btn">
          <span>Log Out</span>
        </button>
      </div>

      <div class="auth-card" id="profile-logged-out" hidden>
        <span class="auth-card__kicker">Restricted Access</span>
        <h1 class="auth-card__title">You're Not Logged In</h1>
        <p class="auth-card__intro">Log in or create an account to view this page.</p>
        <a href="/login.html" class="btn btn--glow"><span>Log In</span></a>
        <p class="auth-card__foot">No account yet? <a href="/signup.html">Sign up</a></p>
      </div>
    </section>
  </main>

  <script src="/auth.js" defer></script>
</body>
</html>
