<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Kiwi Archive</title>
  <meta name="description" content="Create an account to post in the Kiwi Archive Reading Room.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-body">

  <div class="bg-layer" aria-hidden="true">
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
    <div class="sigil-field">
      <img src="/assets/seal.svg" alt="" class="sigil sigil--a">
      <img src="/assets/seal.svg" alt="" class="sigil sigil--c">
    </div>
    <div class="vignette"></div>
    <div class="grain"></div>
  </div>

  <div class="mouse-light" id="mouse-light" aria-hidden="true"></div>

  <header class="site-header" id="site-header">
    <nav class="nav is-scrolled" aria-label="Primary">
      <a href="/" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links">
        <li><a href="/#forum">Forum</a></li>
        <li><a href="/#contacts">Contacts</a></li>
      </ul>
    </nav>
  </header>

  <main id="main" class="auth-page">
    <div class="auth-card">
      <div class="auth-card__header">
        <img src="/assets/seal.svg" alt="" class="auth-card__seal">
        <h1 class="auth-card__title">Create Account</h1>
        <p class="auth-card__sub">Become a Keeper of the Archive</p>
      </div>

      <form class="auth-form" id="signup-form" novalidate>
        <div class="auth-form__row">
          <div class="auth-form__field">
            <label for="su-username">Username</label>
            <input
              type="text"
              id="su-username"
              name="username"
              autocomplete="username"
              required
              minlength="3"
              maxlength="40"
              pattern="[a-zA-Z0-9_]+"
              placeholder="your_handle"
            >
            <span class="auth-form__field-hint" id="username-hint"></span>
          </div>
          <div class="auth-form__field">
            <label for="su-email">Email</label>
            <input
              type="email"
              id="su-email"
              name="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
            >
          </div>
        </div>

        <div class="auth-form__row">
          <div class="auth-form__field">
            <label for="su-password">Password</label>
            <div class="auth-form__pw-wrap">
              <input
                type="password"
                id="su-password"
                name="password"
                autocomplete="new-password"
                required
                minlength="8"
                placeholder="At least 8 characters"
              >
              <button type="button" class="auth-form__pw-toggle" id="pw-toggle-1" aria-label="Toggle password visibility">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="auth-form__field">
            <label for="su-confirm">Confirm Password</label>
            <div class="auth-form__pw-wrap">
              <input
                type="password"
                id="su-confirm"
                name="confirm"
                autocomplete="new-password"
                required
                placeholder="Repeat your password"
              >
              <button type="button" class="auth-form__pw-toggle" id="pw-toggle-2" aria-label="Toggle confirm password visibility">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Password strength indicator -->
        <div class="auth-form__strength" id="pw-strength" aria-hidden="true">
          <div class="auth-form__strength-bar">
            <span class="auth-form__strength-fill" id="pw-strength-fill"></span>
          </div>
          <span class="auth-form__strength-label" id="pw-strength-label"></span>
        </div>

        <p class="auth-form__error" id="signup-error" role="alert" hidden></p>

        <button type="submit" class="btn btn--glow auth-form__submit" id="signup-btn">
          <span>Create Account</span>
        </button>
      </form>

      <p class="auth-card__switch">
        Already a Keeper?
        <a href="/login.html">Sign in →</a>
      </p>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      // Mouse light
      const ml = document.getElementById('mouse-light');
      if (ml && window.matchMedia('(hover: hover)').matches) {
        window.addEventListener('pointermove', e => {
          ml.style.setProperty('--mx', `${e.clientX}px`);
          ml.style.setProperty('--my', `${e.clientY}px`);
        });
      }

      // Redirect if already logged in
      fetch('/api/auth/me').then(r => {
        if (r.ok) window.location.replace('/');
      }).catch(() => {});

      // Password visibility toggles
      const makeToggle = (btnId, inputEl) => {
        const btn = document.getElementById(btnId);
        if (!btn || !inputEl) return;
        btn.addEventListener('click', () => {
          const show = inputEl.type === 'password';
          inputEl.type = show ? 'text' : 'password';
          btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });
      };
      const pw1 = document.getElementById('su-password');
      const pw2 = document.getElementById('su-confirm');
      makeToggle('pw-toggle-1', pw1);
      makeToggle('pw-toggle-2', pw2);

      // Password strength meter
      const strengthFill  = document.getElementById('pw-strength-fill');
      const strengthLabel = document.getElementById('pw-strength-label');
      const strengthLevels = [
        { min: 0,  label: '',         color: 'transparent', pct: 0   },
        { min: 1,  label: 'Weak',     color: '#c05555',     pct: 25  },
        { min: 8,  label: 'Fair',     color: '#b6935c',     pct: 50  },
        { min: 12, label: 'Good',     color: '#4fd99a',     pct: 75  },
        { min: 16, label: 'Strong',   color: '#2f9e6b',     pct: 100 },
      ];
      if (pw1) {
        pw1.addEventListener('input', () => {
          const len = pw1.value.length;
          const level = [...strengthLevels].reverse().find(l => len >= l.min);
          strengthFill.style.width  = `${level.pct}%`;
          strengthFill.style.background = level.color;
          strengthLabel.textContent = level.label;
          strengthLabel.style.color = level.color;
        });
      }

      // Real-time username validation hint
      const usernameInput = document.getElementById('su-username');
      const usernameHint  = document.getElementById('username-hint');
      if (usernameInput && usernameHint) {
        usernameInput.addEventListener('input', () => {
          const val = usernameInput.value;
          if (!val) { usernameHint.textContent = ''; return; }
          if (val.length < 3) {
            usernameHint.textContent = 'At least 3 characters';
            usernameHint.style.color = '#c88a8a';
          } else if (!/^[a-zA-Z0-9_]+$/.test(val)) {
            usernameHint.textContent = 'Only letters, numbers, underscores';
            usernameHint.style.color = '#c88a8a';
          } else {
            usernameHint.textContent = 'Looks good';
            usernameHint.style.color = '#4fd99a';
          }
        });
      }

      // Form submission
      const form      = document.getElementById('signup-form');
      const errorEl   = document.getElementById('signup-error');
      const submitBtn = document.getElementById('signup-btn');

      form.addEventListener('submit', async e => {
        e.preventDefault();
        errorEl.hidden = true;

        const username = form.querySelector('[name=username]').value.trim();
        const email    = form.querySelector('[name=email]').value.trim();
        const password = form.querySelector('[name=password]').value;
        const confirm  = form.querySelector('[name=confirm]').value;

        // Client-side validation
        if (!username || !email || !password || !confirm) {
          errorEl.textContent = 'Please fill in all fields.';
          errorEl.hidden = false;
          return;
        }
        if (username.length < 3) {
          errorEl.textContent = 'Username must be at least 3 characters.';
          errorEl.hidden = false;
          return;
        }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) {
          errorEl.textContent = 'Username may only contain letters, numbers, and underscores.';
          errorEl.hidden = false;
          return;
        }
        if (password.length < 8) {
          errorEl.textContent = 'Password must be at least 8 characters.';
          errorEl.hidden = false;
          return;
        }
        if (password !== confirm) {
          errorEl.textContent = 'Passwords do not match.';
          errorEl.hidden = false;
          return;
        }

        submitBtn.disabled = true;
        submitBtn.querySelector('span').textContent = 'Creating account…';

        try {
          const res  = await fetch('/api/auth/register', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ username, email, password }),
          });
          const data = await res.json();

          if (res.ok) {
            window.location.replace('/');
          } else {
            errorEl.textContent = data.error || 'Registration failed. Please try again.';
            errorEl.hidden = false;
          }
        } catch {
          errorEl.textContent = 'A network error occurred. Please try again.';
          errorEl.hidden = false;
        } finally {
          submitBtn.disabled = false;
          submitBtn.querySelector('span').textContent = 'Create Account';
        }
      });
    })();
  </script>
</body>
</html>
