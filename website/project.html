<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Kiwi</title>
  <meta name="theme-color" content="#07090a">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .project-banner { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: -50px; opacity: 0.8; }
    .project-header { display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2rem; position: relative; z-index: 2; padding: 0 2rem; }
    .project-icon { width: 100px; height: 100px; border-radius: 12px; border: 4px solid #07090a; background: #111; object-fit: cover; }
    .project-title { font-size: 2.5rem; margin: 0; }
    .project-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #888; margin-top: 0.5rem; }
    .project-content { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    
    .progress-bar { width: 100%; background: #222; border-radius: 4px; overflow: hidden; height: 12px; margin-top: 0.5rem; }
    .progress-fill { height: 100%; background: #00ff88; transition: width 0.3s; }
    
    .project-sidebar > div, .project-main > div { background: #0c0f12; border: 1px solid #1a2228; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .project-sidebar h3, .project-main h3 { margin-top: 0; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1.1rem; color: #ddd; margin-bottom: 1rem; border-bottom: 1px solid #222; padding-bottom: 0.5rem; }
    
    .roadmap-item { margin-bottom: 1rem; }
    .roadmap-status { font-size: 0.75rem; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; }
    .status-planned { background: #333; color: #aaa; }
    .status-in-progress { background: #0044ff; color: #fff; }
    .status-completed { background: #008844; color: #fff; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
    .gallery-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; cursor: pointer; transition: transform 0.2s; }
    .gallery-grid img:hover { transform: scale(1.05); }

    .devlog-post { border-bottom: 1px solid #222; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
    .devlog-post:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .devlog-post h4 { margin: 0 0 0.5rem 0; font-size: 1.2rem; }
    .devlog-post .date { font-size: 0.8rem; color: #888; font-family: 'JetBrains Mono', monospace; margin-bottom: 1rem; display: block; }
    .devlog-post img { max-width: 100%; border-radius: 4px; margin-top: 1rem; }
    
    .download-item { display: block; padding: 1rem; background: #151a1e; border: 1px solid #2a353c; border-radius: 6px; text-decoration: none; color: #fff; margin-bottom: 0.5rem; transition: background 0.2s; }
    .download-item:hover { background: #1c2429; }
    .download-item strong { display: block; margin-bottom: 0.2rem; }
    .download-item p { margin: 0; font-size: 0.85rem; color: #aaa; }

    /* Forms for owners */
    .owner-actions { display: none; margin-top: 1rem; gap: 0.5rem; }
    .owner-form { display: none; margin-top: 1rem; background: #111; padding: 1rem; border-radius: 4px; border: 1px dashed #333; }
    .owner-form.active { display: block; }
    .owner-form input, .owner-form textarea, .owner-form select { width: 100%; margin-bottom: 0.5rem; background: #000; border: 1px solid #333; color: #fff; padding: 0.5rem; border-radius: 4px; font-family: inherit; }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <canvas id="dust-canvas"></canvas>
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav" id="site-nav" aria-label="Primary">
      <a href="/" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/projects.html">Projects</a></li>
      </ul>
      <div class="nav__user-area" id="nav-user-area"></div>
    </nav>
  </header>

  <main id="main">
    <section class="section">
      <img id="proj-banner" class="project-banner" src="" alt="" style="display: none;">
      <div class="project-header">
        <img id="proj-icon" class="project-icon" src="" alt="" style="display: none;">
        <div>
          <h1 class="project-title" id="proj-title">Loading...</h1>
          <div class="project-meta">
            By <span id="proj-owner">...</span> &bull; 
            <span id="proj-category">...</span> &bull; 
            <span id="proj-status">...</span>
          </div>
        </div>
        <div style="margin-left: auto; display: flex; gap: 0.5rem;">
          <button class="btn btn--glow" id="btn-follow" style="display:none;"><span>Follow</span></button>
          <button class="btn" id="btn-share"><span>Share</span></button>
        </div>
      </div>

      <div class="project-content reveal">
        <div class="project-main">
          <div>
            <h3>About</h3>
            <p id="proj-desc-full" style="white-space: pre-wrap;">Loading description...</p>
            <div id="proj-tags" style="margin-top: 1rem; color: #888; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;"></div>
            
            <div class="owner-actions" id="owner-actions">
              <button class="btn" id="btn-edit-project">Edit Project Details</button>
              <button class="btn" id="btn-add-update">New Devlog Update</button>
            </div>
          </div>

          <div>
            <h3>Devlog</h3>
            <div id="devlog-form-container" class="owner-form">
              <h4>Post Update</h4>
              <input type="text" id="devlog-title" placeholder="Update Title" required>
              <textarea id="devlog-content" placeholder="Content..." rows="4" required></textarea>
              <input type="url" id="devlog-image" placeholder="Image URL (optional)">
              <button class="btn btn--glow" id="btn-submit-devlog"><span>Post Update</span></button>
            </div>
            <div id="proj-devlog">
              <p class="forum__empty">No updates yet.</p>
            </div>
          </div>
        </div>

        <div class="project-sidebar">
          <div>
            <h3>Progress</h3>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
              <span>Completion</span>
              <span id="proj-progress-text">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="proj-progress-fill" style="width: 0%;"></div>
            </div>
          </div>

          <div>
            <h3>Downloads <button id="btn-add-download" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem; float: right; display:none;">Add</button></h3>
            <div id="download-form-container" class="owner-form">
              <input type="text" id="download-name" placeholder="Name (e.g. Windows Build)" required>
              <input type="text" id="download-desc" placeholder="Short description">
              <input type="url" id="download-url" placeholder="URL" required>
              <button class="btn btn--glow" id="btn-submit-download"><span>Save</span></button>
            </div>
            <div id="proj-downloads">
              <p class="forum__empty">No downloads available.</p>
            </div>
          </div>

          <div>
            <h3>Roadmap <button id="btn-add-roadmap" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem; float: right; display:none;">Add</button></h3>
            <div id="roadmap-form-container" class="owner-form">
              <input type="text" id="roadmap-title" placeholder="Title" required>
              <input type="text" id="roadmap-desc" placeholder="Description">
              <select id="roadmap-status">
                <option value="Planned">Planned</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
              </select>
              <button class="btn btn--glow" id="btn-submit-roadmap"><span>Save</span></button>
            </div>
            <div id="proj-roadmap">
              <p class="forum__empty">No roadmap provided.</p>
            </div>
          </div>

          <div>
            <h3>Gallery <button id="btn-add-gallery" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem; float: right; display:none;">Add</button></h3>
            <div id="gallery-form-container" class="owner-form">
              <input type="url" id="gallery-url" placeholder="Image URL" required>
              <button class="btn btn--glow" id="btn-submit-gallery"><span>Save</span></button>
            </div>
            <div class="gallery-grid" id="proj-gallery">
              <!-- Gallery injected here -->
            </div>
          </div>

          <div>
            <h3>Members</h3>
            <ul id="proj-members" style="list-style: none; padding: 0; margin: 0; font-size: 0.9rem;">
              <!-- Members injected here -->
            </ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__meta">&copy; <span id="year"></span> Kiwi.</p>
  </footer>

  <script src="/script.js" defer></script>
</body>
</html>
