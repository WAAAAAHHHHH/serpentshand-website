<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Project — Kiwi</title>
  <meta name="theme-color" content="#07090a">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .form-container { max-width: 600px; margin: 0 auto; background: #0c0f12; border: 1px solid #1a2228; padding: 2rem; border-radius: 8px; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #888; text-transform: uppercase; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; background: #000; border: 1px solid #222; color: #fff; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 1rem; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #555; outline: none; }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <canvas id="dust-canvas"></canvas>
    <div class="fog fog--one"></div>
    <div class="fog fog--two"></div>
  </div>

  <header class="site-header" id="site-header">
    <nav class="nav" id="site-nav" aria-label="Primary">
      <a href="/" class="nav__mark" aria-label="Kiwi — home">
        <img src="/assets/seal.svg" alt="" width="28" height="28">
        <span>Kiwi</span>
      </a>
      <ul class="nav__links" id="nav-links">
        <li><a href="/projects.html">Projects</a></li>
      </ul>
      <div class="nav__user-area" id="nav-user-area"></div>
    </nav>
  </header>

  <main id="main">
    <section class="section">
      <div class="section__head reveal">
        <span class="section__kicker">New Entry</span>
        <h2 class="section__title">Create Project</h2>
        <p class="section__intro">Establish a home for your creation.</p>
      </div>

      <div class="form-container reveal">
        <form id="create-project-form">
          <div class="form-group">
            <label for="cp-title">Project Name</label>
            <input type="text" id="cp-title" required>
          </div>
          <div class="form-group">
            <label for="cp-desc-short">Short Description</label>
            <input type="text" id="cp-desc-short" required maxlength="250">
          </div>
          <div class="form-group">
            <label for="cp-desc-full">Full Description</label>
            <textarea id="cp-desc-full" rows="6" required></textarea>
          </div>
          <div class="form-group">
            <label for="cp-category">Category</label>
            <input type="text" id="cp-category" placeholder="e.g. Video Game, Music, Art" required>
          </div>
          <div class="form-group">
            <label for="cp-tags">Tags (comma separated)</label>
            <input type="text" id="cp-tags" placeholder="e.g. 2d, pixel-art, rpg">
          </div>
          <div class="form-group">
            <label for="cp-banner">Banner Image URL</label>
            <input type="url" id="cp-banner" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="cp-icon">Icon Image URL</label>
            <input type="url" id="cp-icon" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="cp-visibility">Visibility</label>
            <select id="cp-visibility">
              <option value="public">Public</option>
              <option value="unlisted">Unlisted</option>
            </select>
          </div>

          <p class="forum__hint" id="cp-hint" role="alert" style="color: #ff4444; margin-bottom: 1rem;"></p>
          
          <div style="text-align: right;">
            <button type="submit" class="btn btn--glow" id="cp-submit-btn">
              <span>Create Project</span>
            </button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__meta">&copy; <span id="year"></span> Kiwi.</p>
  </footer>

  <script src="/script.js" defer></script>
</body>
</html>
